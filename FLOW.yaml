# Workflow Pipeline
# A RECOMMENDED end-to-end workflow for AI-assisted delivery, as a sequence of phases.
# Each phase notes the role that typically drives it, the skills typically involved,
# and the artifact(s) produced. Skills are a shared library — they are typically
# involved in a phase, not owned by any role; any role draws whatever the task needs.
# Harness-neutral: roles and skills are portable across Claude Code, opencode, Codex,
# and Hermes; packaging/invocation is per-harness.

name: workflow-pipeline
version: "4.0"
description: |
  Recommended end-to-end pipeline from research to implementation and review.

  Model: Phases → Role that typically drives → Skills typically involved → Artifacts.
  - Role:       the viewpoint that typically drives the phase (a perspective, not a skill bundle).
  - Skills:     the shared-library skills typically involved in the phase; surfaced by
                task match, not bound to any role — any role draws whatever it needs.
  - Artifacts:  the documents or code the phase produces.

  Output paths default under {DOCS_ROOT} (default: docs/).

  Project size is declared in the PRD (first section, mandatory). Roles read the
  PRD to gauge size, which sets the depth of every downstream artifact
  (PRD, architecture, epics, stories).

# =============================================================================
# PIPELINE
# =============================================================================
# research (opt) → requirements → prd → architecture → delivery-design (opt)
#   → design → decomposition (epics/stories/sprints) → implementation → testing
#   → review → deploy
#
# Delivery (devops) lens spans two points, like any role designs early and
# executes late: delivery-design plans how it ships (CI/CD, environments,
# rollback) right after architecture; deploy executes the ship at the end.
# release-engineering is also cross-cutting — callable from architecture,
# decomposition, and implementation wherever delivery concerns surface.
#
pipeline:
  phases:

    # OPTIONAL: investigation before requirements
    - id: research
      name: Research (Optional)
      description: Technical, market, or domain research before requirements
      optional: true
      role: researcher
      skills:
        - research-methodology
      artifacts:
        output:
          - "{DOCS_ROOT}/research/[type]/[topic]-research.md"
      next: requirements

    - id: requirements
      name: Requirements Gathering & Validation
      description: Elicit FR/NFR through stakeholder interviews, then validate
      role: analyst
      skills:
        - requirements-gathering   # also covers requirements validation
        - acceptance-criteria
      artifacts:
        output:
          - "{DOCS_ROOT}/requirements/requirements.md"
      validation:
        skill: requirements-gathering
        checklist: skills/requirements-gathering/references/checklist.md
        required: true
      next: prd

    - id: prd
      name: Product Requirements Document
      description: Create and validate the PRD from validated requirements
      role: pm
      skills:
        - prd-writing              # also covers PRD validation
      artifacts:
        input:
          - "{DOCS_ROOT}/requirements/requirements.md"
        output:
          - "{DOCS_ROOT}/prds/<slug>/PRD.md"
      validation:
        skill: prd-writing
        checklist: skills/prd-writing/references/checklist.md
        required: true
      qa:
        artifact: "{DOCS_ROOT}/prd-acceptance-criteria.md"
        description: Acceptance criteria for all FRs
        template: skills/acceptance-criteria/references/template.md
        mandatory: true
      next: architecture

    - id: architecture
      name: Architecture Design & Validation
      description: Design and validate system architecture from the PRD
      role: architect
      skills:
        - system-architecture      # multi-service landscape; also covers its validation
        - service-architecture     # one service's internals; also covers its validation
        - adr-writing
        - unit-writing
        - coding-standards
        - api-design
        - database-design
        - diagram-creation
        # release-engineering is cross-cutting: callable here so deployment
        # topology, environments, and infra NFRs are shaped with the design,
        # not bolted on at ship time.
        - release-engineering
      artifacts:
        input:
          - "{DOCS_ROOT}/prds/<slug>/PRD.md"
        output:
          - "{DOCS_ROOT}/architecture/system.md   # multi-service only"
          - "{DOCS_ROOT}/architecture.md           # single service, or architecture/<service>.md per service"
          - "{DOCS_ROOT}/architecture/adr/*.md"
      validation:
        skills: [system-architecture, service-architecture]
        checklists:
          - skills/system-architecture/references/checklist.md
          - skills/service-architecture/references/checklist.md
        required: true
      qa:
        artifact: "{DOCS_ROOT}/architecture-integration-tests.md"
        description: Integration test specifications
        template: skills/test-design/references/template-integration.md
        mandatory: true
      next: delivery-design

    # OPTIONAL: plan how the system ships, right after architecture
    - id: delivery-design
      name: Delivery Design (Optional)
      description: >
        Plan how the system ships before stories are cut: CI/CD pipeline,
        environment topology, deploy strategy, and rollback runbooks. The
        early half of the devops lens (deploy executes the late half). Skip
        for TOY/library scope; include where infra is real.
      optional: true
      role: devops
      skills:
        - release-engineering
      artifacts:
        input:
          - "{DOCS_ROOT}/architecture.md"
          - "{DOCS_ROOT}/prds/<slug>/PRD.md"
        output:
          - "{DOCS_ROOT}/ops/ci-cd/*.md"
          - "{DOCS_ROOT}/ops/environments/*.md"
          - "{DOCS_ROOT}/ops/runbooks/*.md"
      next: design

    - id: design
      name: Design (UX & Design System)
      description: Shape UX flows, interface design, and the design system from the architecture
      role: designer
      skills:
        - ux-design
        - design-system
      artifacts:
        input:
          - "{DOCS_ROOT}/prds/<slug>/PRD.md"
          - "{DOCS_ROOT}/architecture.md"
        output:
          - "{DOCS_ROOT}/design/ux-flows.md"
          - "{DOCS_ROOT}/design/design-system.md"
      next: decomposition

    - id: decomposition
      name: Decomposition (Epics / Stories / Sprints)
      description: Break the PRD and architecture into epics, then stories, then sprints
      role: pm
      skills:
        - decomposition            # merges epic / story / sprint-planning
        # cross-cutting: carve infra / ops / deploy stories alongside feature work
        - release-engineering
      artifacts:
        input:
          - "{DOCS_ROOT}/prds/<slug>/PRD.md"
          - "{DOCS_ROOT}/architecture.md"
        output:
          - "{DOCS_ROOT}/backlog/epic-*.md"
          - "{DOCS_ROOT}/backlog/stories/story-*.md"
          - "{DOCS_ROOT}/backlog/sprint-status.yaml"
      validation:
        skill: decomposition
        checklist: skills/decomposition/references/story-checklist.md
        required: true
        rules:
          - All epics have acceptance criteria
          - All stories have Given/When/Then AC
          - All stories have tasks/subtasks
      next: implementation

    - id: implementation
      name: Implementation
      description: Implement stories with TDD; supports single-story plus epic/sprint batch modes
      roles:
        - fullstack-developer      # general / cross-cutting
        - backend-developer        # server / data / API
        - frontend-developer       # UI / UX-fidelity
      skills:
        - dev                      # story loop + epic/sprint batch modes + TDD (shared by all three dev roles)
        - code-review
        - test-design
        - test-scenarios           # author concrete test cases alongside implementation
        # research-planning is cross-cutting: callable wherever unknowns surface,
        # the same way research-methodology is.
        # release-engineering is cross-cutting too: callable when a story carries
        # CI/CD, environment, or deploy work.
        - release-engineering
      # Coordination: the conducting/main agent uses the orchestration trio to
      # dispatch story/epic/sprint batches to the dev role and gate each result.
      coordination:
        - orchestration            # router: pick delegation mode + sequencing
        - orchestration-subagent   # ephemeral subagent calls (sequential/parallel)
        - orchestration-team       # standing role-team via a shared board
      artifacts:
        input:
          - "{DOCS_ROOT}/backlog/sprint-status.yaml"
          - "{DOCS_ROOT}/backlog/epic-*.md"
          - "{DOCS_ROOT}/backlog/stories/story-*.md"
        output:
          - Implementation code
          - Unit tests
          - Integration tests
          - Updated sprint-status.yaml
      modes:
        story: Implement a single story (red-green-refactor)
        epic: Implement all stories in an epic sequentially
        sprint: Implement all epics in a sprint sequentially
      next: testing

    - id: testing
      name: Testing & QA Gate
      description: Author test scenarios, run them, and apply the QA gate before review
      role: tester
      skills:
        - test-scenarios           # primary: author concrete cases/scenarios (also done during implementation)
        - test-execution           # run tests + QA gate
      artifacts:
        input:
          - "{DOCS_ROOT}/backlog/stories/story-*.md"
          - Implementation code
        output:
          - "{DOCS_ROOT}/test/..."
          - "{DOCS_ROOT}/validation/test-report-*.md"
      next: review

    - id: review
      name: Code Review
      description: Review implemented code for quality and correctness
      role: reviewer
      skills:
        - code-review              # checklist embedded in the skill
      artifacts:
        input:
          - "{DOCS_ROOT}/backlog/stories/story-*.md"
          - Implementation code
        output:
          - Review notes
          - Review follow-up tasks
      next: deploy                 # loops back to implementation if changes requested

    - id: deploy
      name: Deploy (Ship)
      description: Build and ship the release; final step in the pipeline
      role: devops
      skills:
        - release-engineering      # CI/CD, build, deploy
      artifacts:
        input:
          - Implementation code
          - "{DOCS_ROOT}/validation/test-report-*.md"
        output:
          - "{DOCS_ROOT}/ops/release-*.md"
      gate:
        type: deploy
        hard: true
        description: >
          HARD deploy gate. Ship only on explicit human confirmation AND green checks
          (tests pass, review approved, QA gate cleared). Never deploy unprompted.
      next: null                   # end of pipeline

# =============================================================================
# ARTIFACT TEMPLATES
# =============================================================================
# Output paths default under {DOCS_ROOT} (default: docs/).
artifacts:
  requirements:
    path: "{DOCS_ROOT}/requirements/requirements.md"
    template: skills/requirements-gathering/references/template.md

  prd:
    path: "{DOCS_ROOT}/prds/<slug>/PRD.md"
    template: skills/prd-writing/references/template.md

  prd-qa:
    path: "{DOCS_ROOT}/prd-acceptance-criteria.md"
    template: skills/acceptance-criteria/references/template.md
    mandatory: true

  system-architecture:
    path: "{DOCS_ROOT}/architecture/system.md"
    template: skills/system-architecture/references/template.md
    note: multi-service systems only

  architecture:
    path: "{DOCS_ROOT}/architecture.md"
    template: skills/service-architecture/references/template.md

  adr:
    path: "{DOCS_ROOT}/architecture/adr/*.md"
    template: skills/adr-writing/references/template.md

  design:
    path: "{DOCS_ROOT}/design/ux-flows.md"
    template: skills/ux-design/references/template.md

  design-system:
    path: "{DOCS_ROOT}/design/design-system.md"
    template: skills/design-system/references/template.md

  architecture-qa:
    path: "{DOCS_ROOT}/architecture-integration-tests.md"
    template: skills/test-design/references/template-integration.md
    mandatory: true

  epic:
    path: "{DOCS_ROOT}/backlog/epic-*.md"
    template: skills/decomposition/references/epic-template.md
    naming: "epic-{NN}-{module}-{description}.md"
    id_format: "{MODULE}-E{NN}"

  story:
    path: "{DOCS_ROOT}/backlog/stories/story-*.md"
    template: skills/decomposition/references/story-template.md
    naming: "story-{EPIC}-{NN}-{description}.md"
    id_format: "{MODULE}-S{EPIC}-{NN}"

  sprint-status:
    path: "{DOCS_ROOT}/backlog/sprint-status.yaml"
    template: skills/decomposition/references/sprint-template.yaml
    format: yaml

  test-report:
    path: "{DOCS_ROOT}/validation/test-report-*.md"
    template: skills/test-execution/references/template.md

  release:
    path: "{DOCS_ROOT}/ops/release-*.md"
    template: skills/release-engineering/references/template.md
