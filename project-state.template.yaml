# Project State — template
#
# Copy this file to project-state.yaml at the **repository root** (same level as
# FLOW.yaml) in your project. The conducting agent reads it at session start to
# resume work without re-onboarding. Update it on every phase / status transition.
#
# The state file lives at the root, NOT under {DOCS_ROOT} — it is a workflow
# control file (like FLOW.yaml), not a pipeline output.
#
# Fields:
#   project         — project name (free text)
#   current_phase   — one of FLOW.yaml phase ids (see values below)
#   phase_started   — ISO date when the current phase began
#   size            — project size from the PRD (TOY | SMALL | MEDIUM | LARGE)
#   prd_ref         — path to PRD (relative to repo root)
#   arch_ref        — path to architecture doc
#   standards_index — path to standards index (or null if not yet authored)
#   active_work     — list of epics/stories currently in flight
#   open_decisions  — list of decisions awaiting human input
#   last_updated    — ISO timestamp of last meaningful change
#   last_session    — short summary of what the last session accomplished

project: <project-name>
current_phase: research  # research | requirements | prd | architecture | delivery-design | design | decomposition | implementation | testing | review | deploy
phase_started: 2026-01-01
size: SMALL  # TOY | SMALL | MEDIUM | LARGE

prd_ref: docs/prds/<slug>/PRD.md
arch_ref: docs/architecture.md
standards_index: docs/standards/INDEX.md  # null until authored

active_work: []
  # - id: <epic-or-story-id>
  #   status: in_progress  # in_progress | review | done | blocked
  #   blocked_on: null     # text or null

open_decisions: []
  # - id: <decision-id>
  #   status: awaiting_human  # awaiting_human | resolved
  #   summary: <one-line description>
  #   options: [<opt-1>, <opt-2>]

last_updated: 2026-01-01T00:00:00Z
last_session: null  # one-line summary of previous session outcome
